name: Family Mart CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd server
          npm install
          
      - name: Run linter
        run: |
          cd server
          npm run lint || true
          
      - name: Run tests
        run: |
          cd server
          npm test || true

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd client
          npm install
          
      - name: Build client
        run: |
          cd client
          npm run build

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push server
        run: |
          cd server
          docker build -t familymart/server:${{ github.sha }} .
          docker push familymart/server:${{ github.sha }}
          
      - name: Build and push client
        run: |
          cd client
          docker build -t familymart/client:${{ github.sha }} .
          docker push familymart/client:${{ github.sha }}
